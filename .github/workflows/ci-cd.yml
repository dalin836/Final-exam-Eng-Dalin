name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: maven

      - name: Build application
        run: |
          mvn clean
          mvn compile
          mvn package -DskipTests=true
          
      - name: Verify JAR
        run: |
          echo "Checking for JAR files..."
          ls -la target/
          if ls target/*.jar 1> /dev/null 2>&1; then
            echo "✅ JAR file created successfully"
          else
            echo "❌ No JAR file found"
            exit 1
          fi

      - name: Install Java 21
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-21-jdk
          java -version

      - name: Deploy application
        run: |
          DEPLOY_DIR="/opt/idcard-management"
          APP_PORT=8001
          
          # Create directories
          sudo mkdir -p ${DEPLOY_DIR}
          sudo mkdir -p /var/log/idcard-management
          
          # Copy JAR
          sudo cp target/*.jar ${DEPLOY_DIR}/app.jar
          
          # Copy properties if exists
          if [ -f application.properties ]; then
            sudo cp application.properties ${DEPLOY_DIR}/
          fi
          
          # Stop existing process
          sudo pkill -f app.jar || true
          sleep 2
          
          # Start application with proper logging
          cd ${DEPLOY_DIR}
          sudo nohup java -jar app.jar \
            --server.port=${APP_PORT} \
            --spring.profiles.active=production \
            > /var/log/idcard-management/app.log 2>&1 &
          
          echo "✅ Application started on port ${APP_PORT}"
          
          # Wait and check
          echo "Waiting for application to start..."
          sleep 15
          
          # Check process
          if pgrep -f app.jar; then
            echo "✅ Application process is running"
          else
            echo "❌ Application process not found"
            echo "=== Logs ==="
            cat /var/log/idcard-management/app.log
            exit 1
          fi
          
      - name: Health check
        run: |
          echo "Checking health endpoint..."
          for i in {1..15}; do
            if curl -s -f http://localhost:8001/actuator/health > /dev/null 2>&1; then
              echo "✅ Application is healthy!"
              curl -s http://localhost:8001/actuator/health
              exit 0
            fi
            echo "Attempt $i/15: Application not ready yet..."
            sleep 3
          done
          echo "❌ Health check failed after 15 attempts"
          echo ""
          echo "=== Application Logs ==="
          cat /var/log/idcard-management/app.log | tail -50
          exit 1
          
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: application-logs
          path: /var/log/idcard-management/app.log
          
      - name: Show deployment info
        if: always()
        run: |
          echo "=== Running Processes ==="
          ps aux | grep java | grep -v grep || echo "No Java process found"
          echo ""
          echo "=== Open Ports ==="
          sudo netstat -tlnp | grep 8001 || echo "Port 8001 not listening"
          echo ""
          echo "=== Disk Usage ==="
          df -h
