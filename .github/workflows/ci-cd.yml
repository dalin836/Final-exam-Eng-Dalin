name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: maven

      - name: Build application
        run: |
          mvn clean
          mvn compile
          mvn package -DskipTests=true
          
      - name: Verify JAR
        run: |
          echo "Checking for JAR files..."
          ls -la target/
          if ls target/*.jar 1> /dev/null 2>&1; then
            echo "✅ JAR file created successfully"
          else
            echo "❌ No JAR file found"
            exit 1
          fi

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          ansible --version
          
      - name: Create inventory
        run: |
          cat > inventory.ini << 'INV'
          [web]
          localhost ansible_connection=local ansible_python_interpreter=/usr/bin/python3
          INV
          cat inventory.ini
          
      - name: Deploy with Ansible
        run: |
          ansible-playbook -i inventory.ini deploy.yml \
            --extra-vars "app_version=${GITHUB_SHA::7}" \
            -vvv
          
      - name: Health check
        run: |
          echo "Waiting for application to be ready..."
          sleep 10
          for i in {1..10}; do
            if curl -s -f http://localhost:8001/actuator/health > /dev/null 2>&1; then
              echo "✅ Application is healthy!"
              curl -s http://localhost:8001/actuator/health | jq . || cat
              exit 0
            fi
            echo "Attempt $i/10: Application not ready yet..."
            sleep 3
          done
          echo "❌ Health check failed"
          exit 1
          
      - name: Show application logs
        if: always()
        run: |
          echo "=== Application Logs ==="
          if [ -f /var/log/idcard-management/app.log ]; then
            cat /var/log/idcard-management/app.log | tail -50
          else
            echo "No log file found"
          fi
          
      - name: Check running processes
        if: always()
        run: |
          echo "=== Running Processes ==="
          ps aux | grep idcard-management | grep -v grep || echo "No process found"
          echo ""
          echo "=== Open Ports ==="
          sudo netstat -tlnp | grep 8001 || echo "Port 8001 not listening"
