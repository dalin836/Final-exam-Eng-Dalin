name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: maven
      - name: Build
        run: mvn clean package -DskipTests=true
      - name: Deploy
        run: |
          sudo mkdir -p /opt/idcard-management
          sudo cp target/*.jar /opt/idcard-management/app.jar
          sudo pkill -f app.jar || true
          cd /opt/idcard-management
          sudo ${JAVA_HOME}/bin/java -jar app.jar --server.port=8001 > app.log 2>&1 &
          sleep 15
          if pgrep -f app.jar; then
            echo "✅ Running"
            curl http://localhost:8001/actuator/health
          else
            echo "❌ Failed"
            cat app.log
            exit 1
          fi
      - name: Show logs
        if: always()
        run: cat /opt/idcard-management/app.log || echo "No log"
