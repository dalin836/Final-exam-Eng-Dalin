- name: Deploy with output capture
  run: |
    sudo mkdir -p /opt/idcard-management
    sudo cp target/*.jar /opt/idcard-management/app.jar
    
    # Run and capture output
    cd /opt/idcard-management
    sudo java -jar app.jar --server.port=8001 2>&1 | tee app.log &
    JOB_PID=$!
    
    echo "Started with PID: $JOB_PID"
    sleep 10
    
    # Check if process exists
    if ps -p $JOB_PID > /dev/null 2>&1; then
      echo "✅ Process running"
    else
      echo "❌ Process died"
      echo "=== Full log ==="
      cat app.log
      exit 1
    fi